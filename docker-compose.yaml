services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    image: aureuserp:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      APP_NAME: "${APP_NAME:-AureusERP}"
      APP_LOCALE: "${APP_LOCALE:-en}"
      APP_TIMEZONE: "${APP_TIMEZONE:-UTC}"
      APP_CURRENCY: "${APP_CURRENCY:-USD}"
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: aureuserp
      DB_USERNAME: aureuserp
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: "null"
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_DOMAIN: "${SESSION_DOMAIN:-null}"
      FILESYSTEM_DISK: public
      BROADCAST_CONNECTION: log
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-2525}"
      MAIL_USERNAME: "${MAIL_USERNAME:-null}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-null}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-null}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-hello@example.com}"
      MAIL_FROM_NAME: "${APP_NAME:-AureusERP}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - aureuserp-storage:/var/www/html/storage/app
      - aureuserp-logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:11
    platform: linux/arm64
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aureuserp
      MYSQL_USER: aureuserp
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - aureuserp-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: unless-stopped
    volumes:
      - aureuserp-redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  aureuserp-storage:
  aureuserp-logs:
  aureuserp-mysql:
  aureuserp-redis: